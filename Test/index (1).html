<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>PitchTag ⚾</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #1d4ed8;
      --primary-dark:  #1e3a8a;
      --primary-light: #dbeafe;
      --green:  #16a34a;
      --red:    #dc2626;
      --bg:     #ffffff;
      --surf:   #f8fafc;
      --surf2:  #f1f5f9;
      --border: #e2e8f0;
      --text:   #0f172a;
      --muted:  #64748b;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ── SCREENS ── */
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── HOME ── */
    #screen-home { background: var(--bg); overflow-y: auto; }

    .home-hero {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: white;
      text-align: center;
      padding: 32px 24px 24px;
      position: relative;
    }
    .home-hero .ball { font-size: 52px; margin-bottom: 8px; line-height:1; }
    .home-hero h1 { font-size: 34px; font-weight: 900; letter-spacing: -1px; }
    .home-hero p  { font-size: 15px; opacity: .8; margin-top: 4px; }

    .mobile-view-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.4);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .mobile-view-btn:active { background: rgba(255,255,255,.3); }
    .mobile-view-btn.active {
      background: rgba(255,255,255,.95);
      color: #1e3a8a;
      border-color: white;
    }

    .home-form { padding: 24px 20px 0; }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 17px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      background: white;
      color: var(--text);
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    .form-group input:focus { border-color: var(--primary); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .12s, opacity .12s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.96); }
    .btn-primary   { background: var(--primary); color: white; }
    .btn-secondary { background: var(--surf2); color: var(--text); border: 2px solid var(--border); }
    .btn-full { width: 100%; }
    .btn-lg   { padding: 16px 24px; font-size: 18px; border-radius: 14px; }

    /* ── SESSIONS LIST ── */
    .sessions-section { padding: 20px 20px 32px; }
    .section-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 12px;
    }

    .session-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: background .15s;
      gap: 12px;
    }
    .session-card:active { background: var(--surf2); }
    .sc-info { flex: 1; min-width: 0; }
    .sc-info h3 {
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sc-info p { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .sc-count { text-align: right; flex-shrink: 0; }
    .sc-count .num { font-size: 24px; font-weight: 900; color: var(--primary); line-height: 1; }
    .sc-count .lbl { font-size: 10px; color: var(--muted); font-weight: 600; }

    .del-btn {
      background: none; border: none; font-size: 18px; cursor: pointer;
      padding: 6px 4px; border-radius: 8px; color: var(--muted);
      flex-shrink: 0; touch-action: manipulation; transition: background .15s;
    }
    .del-btn:active { background: #fee2e2; color: var(--red); }

    .empty-state { text-align: center; padding: 28px 20px; color: var(--muted); }
    .empty-state .ei { font-size: 36px; margin-bottom: 8px; }
    .empty-state p   { font-size: 14px; }

    /* ── LOGGER ── */
    #screen-logger {
      background: var(--surf);
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    .logger-header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: white;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }
    .lh-info { flex: 1; min-width: 0; }
    .lh-pitcher { font-size: 16px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lh-date    { font-size: 11px; opacity: .75; margin-top: 1px; }

    .pitch-badge {
      background: rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 4px 14px;
      text-align: center;
      flex-shrink: 0;
    }
    .pitch-badge .pnum { font-size: 22px; font-weight: 900; line-height: 1; }
    .pitch-badge .plbl { font-size: 9px; font-weight: 700; opacity: .8; text-transform: uppercase; letter-spacing: .5px; }

    .end-btn {
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.45);
      color: white;
      padding: 7px 14px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
      transition: background .15s;
    }
    .end-btn:active { background: rgba(255,255,255,.3); }

    .logger-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 6px 10px 8px;
      gap: 5px;
      overflow: hidden; /* no scroll — everything fits */
    }

    /* ── ZONE ── */
    .zone-tip {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .3px;
      flex-shrink: 0;
    }
    .zone-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      cursor: crosshair;
      flex: 1 1 0;        /* grow to fill, but shrink if needed */
      min-height: 0;      /* allow shrinking below content size */
      display: flex;
      align-items: stretch;
    }
    .zone-svg { display: block; width: 100%; height: 100%; object-fit: contain; }

    /* ── CONTROLS PANEL (pitch types + result + action all together) ── */
    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    /* ── PITCH TYPE BUTTONS ── */
    .blk-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .pitch-types {
      display: grid;
      grid-template-columns: repeat(8, 1fr); /* single row on iPad */
      gap: 5px;
      flex-shrink: 0;
    }
    .pt-btn {
      padding: 7px 2px 6px;
      border-radius: 10px;
      border: 2.5px solid transparent;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      text-align: center;
      background: var(--surf2);
      transition: transform .12s, border-color .12s, background .12s, box-shadow .12s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.2;
    }
    .pt-btn:active { transform: scale(.92); }
    .pt-btn.sel { transform: scale(1.06); box-shadow: var(--shadow-md); }
    .pt-name { font-size: 8px; font-weight: 600; opacity: .65; display: block; }

    /* ── BOTTOM ROW: result + action combined ── */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto 1fr;
      gap: 6px;
      flex-shrink: 0;
      align-items: stretch;
    }

    /* ── RESULT BUTTONS ── */
    .res-btn {
      padding: 10px 8px;
      border-radius: 10px;
      border: 2.5px solid var(--border);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      background: white;
      transition: all .15s;
      touch-action: manipulation;
    }
    .res-btn:active { transform: scale(.96); }
    .res-btn.strike.sel { background: #dcfce7; border-color: #16a34a; color: #16a34a; }
    .res-btn.ball.sel   { background: #fee2e2; border-color: #dc2626;  color: #dc2626; }

    /* ── DIVIDER between result and action ── */
    .row-divider {
      width: 1px;
      background: var(--border);
      border-radius: 2px;
      align-self: stretch;
    }

    /* ── ACTION BUTTONS ── */
    .undo-btn {
      padding: 10px 14px;
      background: white;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      touch-action: manipulation;
      transition: background .15s;
      white-space: nowrap;
    }
    .undo-btn:active { background: var(--surf2); }
    .undo-btn:disabled { opacity: .35; cursor: not-allowed; }

    .log-btn {
      padding: 10px 13px;
      background: var(--primary);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .15s, transform .12s;
      white-space: nowrap;
    }
    .log-btn:not(:disabled):active { background: var(--primary-dark); transform: scale(.97); }
    .log-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* ── NARROW PHONE FALLBACK: stack pitch types 4-per-row ── */
    @media (max-width: 500px) {
      .pitch-types { grid-template-columns: repeat(4, 1fr); }
      .bottom-row  { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; }
      .row-divider { display: none; }
      .undo-btn    { grid-column: span 1; }
      .log-btn     { grid-column: span 1; }
    }

    /* ── SUMMARY ── */
    #screen-summary { overflow: hidden; height: 100vh; height: 100dvh; }

    .summary-header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: white;
      padding: 14px 18px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .summary-header h2 { font-size: 22px; font-weight: 900; }
    .summary-header p  { font-size: 12px; opacity: .8; margin-top: 3px; }

    .new-session-btn {
      background: rgba(255,255,255,.18);
      border: 1.5px solid rgba(255,255,255,.45);
      color: white;
      padding: 8px 14px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
      transition: background .15s;
      white-space: nowrap;
    }
    .new-session-btn:active { background: rgba(255,255,255,.3); }

    .summary-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 14px 32px;
    }

    .sum-zone-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 14px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }
    .sum-zone-wrap .zone-svg { pointer-events: none; }

    /* ── STATS CARDS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 8px;
      text-align: center;
    }
    .stat-val { font-size: 26px; font-weight: 900; line-height: 1; }
    .stat-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-top: 4px; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      padding: 10px 12px;
      background: var(--surf);
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; }

    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; margin-bottom: 16px; border-radius: var(--radius); border: 1px solid var(--border); }
    .pitch-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 300px; }
    .pitch-table thead tr { background: var(--surf2); }
    .pitch-table th {
      padding: 10px 8px;
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap;
    }
    .pitch-table th:first-child { text-align: left; }
    .pitch-table td {
      padding: 10px 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    .pitch-table td:first-child { text-align: left; }
    .pitch-table tr:last-child td { border-bottom: none; }

    .type-cell { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── MOBILE VIEW MODE ── */
    body.mobile-view {
      background: #94a3b8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 0 40px;
    }
    body.mobile-view .screen.active {
      width: 390px;
      min-height: 0;
      height: 844px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35), 0 0 0 8px #1e293b;
      overflow: hidden;
    }
    body.mobile-view #screen-logger,
    body.mobile-view #screen-summary {
      height: 844px;
    }
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #0f172a;
      color: white;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      pointer-events: none;
      transition: transform .28s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      box-shadow: var(--shadow-md);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes dotPulse {
      0%,100% { r: 9; opacity: .9; }
      50%      { r: 11; opacity: .65; }
    }
    .pending-pulse { animation: dotPulse .85s ease-in-out infinite; }
  </style>
</head>
<body>

<!-- ════════════════════════════
     SCREEN 1 — HOME
════════════════════════════ -->
<div id="screen-home" class="screen active">

  <div class="home-hero">
    <button class="mobile-view-btn" id="mobile-view-btn" onclick="toggleMobileView()">
      📱 Mobile View
    </button>
    <div class="ball">⚾</div>
    <h1>PitchTag</h1>
    <p>Track every pitch, every session</p>
  </div>

  <div class="home-form">
    <div class="form-group" style="margin-top:20px">
      <label for="pitcher-name">Pitcher Name</label>
      <input type="text" id="pitcher-name" placeholder="Enter pitcher name…"
             autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false">
    </div>
    <button class="btn btn-primary btn-full btn-lg" id="start-btn">
      ⚾&nbsp; Start New Session
    </button>
  </div>

  <div class="sessions-section">
    <div class="section-title">Past Sessions</div>
    <div id="sessions-list"></div>
  </div>

</div>


<!-- ════════════════════════════
     SCREEN 2 — LOGGER
════════════════════════════ -->
<div id="screen-logger" class="screen">

  <div class="logger-header">
    <div class="lh-info">
      <div class="lh-pitcher" id="lh-pitcher">—</div>
      <div class="lh-date"    id="lh-date">—</div>
    </div>
    <div class="pitch-badge">
      <div class="pnum" id="pitch-count">0</div>
      <div class="plbl">pitches</div>
    </div>
    <button class="end-btn" id="end-btn">End Session ✓</button>
  </div>

  <div class="logger-body">

    <div class="zone-tip">Tap to place pitch · tap again to move it</div>

    <div class="zone-wrap" id="zone-wrap">
      <svg class="zone-svg" id="zone-svg" viewBox="0 0 280 320"
           xmlns="http://www.w3.org/2000/svg">
        <!-- background -->
        <rect width="280" height="320" fill="#f8fafc"/>
        <!-- competitive zone -->
        <rect x="42" y="16" width="196" height="288" rx="4"
              fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,4"/>
        <!-- strike zone fill -->
        <rect x="70" y="48" width="140" height="224" fill="#f0f9ff"/>
        <!-- 9 white cells -->
        <rect x="70.5"  y="48.5"  width="46.2" height="74.4" fill="white"/>
        <rect x="116.7" y="48.5"  width="46.6" height="74.4" fill="white"/>
        <rect x="163.3" y="48.5"  width="46.2" height="74.4" fill="white"/>
        <rect x="70.5"  y="122.9" width="46.2" height="74.4" fill="white"/>
        <rect x="116.7" y="122.9" width="46.6" height="74.4" fill="white"/>
        <rect x="163.3" y="122.9" width="46.2" height="74.4" fill="white"/>
        <rect x="70.5"  y="197.3" width="46.2" height="74.2" fill="white"/>
        <rect x="116.7" y="197.3" width="46.6" height="74.2" fill="white"/>
        <rect x="163.3" y="197.3" width="46.2" height="74.2" fill="white"/>
        <!-- grid lines -->
        <line x1="116.7" y1="48"  x2="116.7" y2="272" stroke="#e2e8f0" stroke-width="1"/>
        <line x1="163.3" y1="48"  x2="163.3" y2="272" stroke="#e2e8f0" stroke-width="1"/>
        <line x1="70"  y1="122.7" x2="210"   y2="122.7" stroke="#e2e8f0" stroke-width="1"/>
        <line x1="70"  y1="197.3" x2="210"   y2="197.3" stroke="#e2e8f0" stroke-width="1"/>
        <!-- zone numbers (L→R, top→bottom: 1-9) -->
        <text x="93.3"  y="89"  text-anchor="middle" font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="700">1</text>
        <text x="140"   y="89"  text-anchor="middle" font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="700">2</text>
        <text x="186.7" y="89"  text-anchor="middle" font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="700">3</text>
        <text x="93.3"  y="163" text-anchor="middle" font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="700">4</text>
        <text x="140"   y="163" text-anchor="middle" font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="700">5</text>
        <text x="186.7" y="163" text-anchor="middle" font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="700">6</text>
        <text x="93.3"  y="237" text-anchor="middle" font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="700">7</text>
        <text x="140"   y="237" text-anchor="middle" font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="700">8</text>
        <text x="186.7" y="237" text-anchor="middle" font-size="11" fill="#d1d5db" font-family="sans-serif" font-weight="700">9</text>
        <!-- strike zone border -->
        <rect x="70" y="48" width="140" height="224" fill="none" stroke="#334155" stroke-width="2.5"/>
        <!-- direction labels -->
        <text x="140" y="11"  text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif" font-weight="700" letter-spacing=".5">HIGH</text>
        <text x="140" y="318" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif" font-weight="700" letter-spacing=".5">LOW</text>

        <line x1="70"  y1="197.3" x2="210"   y2="197.3" stroke="#e2e8f0" stroke-width="1"/>

        <text x="140" y="318" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif" font-weight="700">LOW</text>

<div id="toast" class="toast"></div>

<script>
// ─────────────────────────────────────────
//  MOBILE VIEW TOGGLE
// ─────────────────────────────────────────
function toggleMobileView() {
  const isOn = document.body.classList.toggle('mobile-view');
  const btn  = document.getElementById('mobile-view-btn');
  btn.classList.toggle('active', isOn);
  btn.textContent = isOn ? '🖥️ Full View' : '📱 Mobile View';
  localStorage.setItem('pitchtag_mobileview', isOn ? '1' : '0');
}

// ─────────────────────────────────────────
//  PITCH TYPE DEFINITIONS
// ─────────────────────────────────────────
const PITCH_TYPES = [
  { id:'FB', name:'Fastball',  color:'#EF4444' },
  { id:'SI', name:'Sinker',    color:'#F97316' },
  { id:'SP', name:'Split',     color:'#EC4899' },
  { id:'SV', name:'Slider',    color:'#8B5CF6' },
  { id:'CH', name:'Changeup',  color:'#14B8A6' },
  { id:'SW', name:'Sweeper',   color:'#38BDF8' },
  { id:'CT', name:'Cutter',    color:'#22C55E' },
  { id:'CB', name:'Curveball', color:'#EAB308' },
];

// Zone boundaries — normalized 0–1 (SVG is 280×320)
const ZN = {
  iz: { x1:.25, x2:.75, y1:.15, y2:.85 },  // strike zone
  cz: { x1:.15, x2:.85, y1:.05, y2:.95 },  // competitive zone
};
const SVG_W = 280, SVG_H = 320;

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let session   = null;   // {id, pitcher, date, pitches[]}
let selType   = null;   // selected pitch type id string
let selResult = null;   // 'Strike' | 'Ball'
let pendingXY = null;   // {x,y} normalized — where user last tapped

// ─────────────────────────────────────────
//  LOCAL STORAGE
// ─────────────────────────────────────────
const LS = 'pitchtag_v1';
const loadAll = () => { try { return JSON.parse(localStorage.getItem(LS)||'[]'); } catch { return []; } };
const saveAll = a => localStorage.setItem(LS, JSON.stringify(a));
function upsert(s) {
  const all = loadAll();
  const i   = all.findIndex(x => x.id === s.id);
  if (i >= 0) all[i] = s; else all.unshift(s);
  saveAll(all);
}

// ─────────────────────────────────────────
//  ZONE MATH
// ─────────────────────────────────────────
function classifyXY(nx, ny) {
  if (nx >= ZN.iz.x1 && nx <= ZN.iz.x2 && ny >= ZN.iz.y1 && ny <= ZN.iz.y2) return 'in-zone';
  if (nx >= ZN.cz.x1 && nx <= ZN.cz.x2 && ny >= ZN.cz.y1 && ny <= ZN.cz.y2) return 'competitive';
  return 'non-competitive';
}

// ─────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ─────────────────────────────────────────
//  HOME SCREEN
// ─────────────────────────────────────────
function initHome() {
  document.getElementById('pitcher-name').value = '';
  renderList();
}

function renderList() {
  const all = loadAll();
  const el  = document.getElementById('sessions-list');
  if (!all.length) {
    el.innerHTML = `<div class="empty-state"><div class="ei">📋</div><p>No sessions yet — start your first!</p></div>`;
    return;
  }
  el.innerHTML = all.map(s => {
    const total = s.pitches.length;
    const ks    = s.pitches.filter(p => p.result==='Strike').length;
    const kpct  = total ? Math.round(ks/total*100) : 0;
    const d     = new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    return `
      <div class="session-card" onclick="openSession('${s.id}')">
        <div class="sc-info">
          <h3>${esc(s.pitcher)}</h3>
          <p>${d} &middot; ${kpct}% strikes</p>
        </div>
        <div class="sc-count">
          <div class="num">${total}</div>
          <div class="lbl">pitches</div>
        </div>
        <button class="del-btn" onclick="event.stopPropagation();delSession('${s.id}')">🗑</button>
      </div>`;
  }).join('');
}

function delSession(id) {
  if (!confirm('Delete this session?')) return;
  saveAll(loadAll().filter(s => s.id !== id));
  renderList();
}

function openSession(id) {
  const s = loadAll().find(x => x.id === id);
  if (s) showSummary(s);
}

function startSession() {
  const name = document.getElementById('pitcher-name').value.trim();
  if (!name) { toast('Please enter a pitcher name'); document.getElementById('pitcher-name').focus(); return; }
  session = { id: Date.now().toString(), pitcher: name, date: new Date().toISOString(), pitches: [] };
  upsert(session);
  initLogger();
  showScreen('logger');
}

// ─────────────────────────────────────────
//  LOGGER SCREEN
// ─────────────────────────────────────────
function initLogger() {
  document.getElementById('lh-pitcher').textContent = session.pitcher;
  document.getElementById('lh-date').textContent =
    new Date(session.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  selType = selResult = pendingXY = null;
  buildTypeButtons();
  refreshLogger();
  renderDots('dots-layer', session.pitches);
}

function buildTypeButtons() {
  document.getElementById('pitch-types').innerHTML = PITCH_TYPES.map(pt => `
    <button class="pt-btn" id="pt-${pt.id}" style="color:${pt.color}"
            onclick="pickType('${pt.id}')">
      ${pt.id}<span class="pt-name">${pt.name}</span>
    </button>`).join('');
}

function pickType(id)   { selType   = id;     refreshLogger(); }
function pickResult(r)  { selResult = r;      refreshLogger(); }

function refreshLogger() {
  document.getElementById('pitch-count').textContent = session.pitches.length;

  // Pitch type buttons
  PITCH_TYPES.forEach(pt => {
    const b = document.getElementById('pt-' + pt.id);
    if (!b) return;
    if (selType === pt.id) {
      b.classList.add('sel');
      b.style.background   = pt.color + '28';
      b.style.borderColor  = pt.color;
    } else {
      b.classList.remove('sel');
      b.style.background   = '';
      b.style.borderColor  = 'transparent';
    }
  });

  // Result buttons
  document.getElementById('res-strike').classList.toggle('sel', selResult === 'Strike');
  document.getElementById('res-ball').classList.toggle('sel',   selResult === 'Ball');

  // Undo / Log buttons
  document.getElementById('undo-btn').disabled = session.pitches.length === 0;
  document.getElementById('log-btn').disabled  = !(selType && selResult && pendingXY);

  // Pending dot
  const dot = document.getElementById('pending-dot');
  if (pendingXY) {
    const pt = PITCH_TYPES.find(p => p.id === selType);
    dot.setAttribute('cx', (pendingXY.x * SVG_W).toFixed(1));
    dot.setAttribute('cy', (pendingXY.y * SVG_H).toFixed(1));
    dot.setAttribute('fill', pt ? pt.color : '#94a3b8');
    dot.setAttribute('opacity', '0.85');
    dot.classList.add('pending-pulse');
  } else {
    dot.setAttribute('cx', '-99'); dot.setAttribute('cy', '-99');
    dot.setAttribute('opacity', '0');
    dot.classList.remove('pending-pulse');
  }
}

function handleZoneTap(e) {
  e.preventDefault();
  const rect = document.getElementById('zone-svg').getBoundingClientRect();
  let cx, cy;
  const src = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  cx = src.clientX; cy = src.clientY;
  pendingXY = {
    x: clamp((cx - rect.left) / rect.width,  0.01, 0.99),
    y: clamp((cy - rect.top)  / rect.height, 0.01, 0.99)
  };
  refreshLogger();
}

function logPitch() {
  if (!selType || !selResult || !pendingXY) return;
  session.pitches.push({
    id:     Date.now().toString(),
    type:   selType,
    result: selResult,
    x:      pendingXY.x,
    y:      pendingXY.y,
    zone:   classifyXY(pendingXY.x, pendingXY.y),
    ts:     new Date().toISOString()
  });
  upsert(session);
  pendingXY = null;
  renderDots('dots-layer', session.pitches);
  refreshLogger();
  toast(`${selType} · ${selResult} logged`, 1000);
}

function undoPitch() {
  if (!session.pitches.length) return;
  const last = session.pitches.pop();
  upsert(session);
  renderDots('dots-layer', session.pitches);
  refreshLogger();
  toast(`Removed: ${last.type} · ${last.result}`);
}

function endSession() {
  if (!session.pitches.length && !confirm('End session with 0 pitches?')) return;
  showSummary(session);
}

// ─────────────────────────────────────────
//  DOT RENDERING
// ─────────────────────────────────────────
function renderDots(layerId, pitches) {
  const layer = document.getElementById(layerId);
  if (!layer) return;
  layer.innerHTML = pitches.map(p => {
    const pt    = PITCH_TYPES.find(t => t.id === p.type);
    const color = pt ? pt.color : '#888';
    return `<circle
      cx="${(p.x * SVG_W).toFixed(1)}"
      cy="${(p.y * SVG_H).toFixed(1)}"
      r="${p.result === 'Ball' ? 7 : 8}"
      fill="${color}"
      stroke="white" stroke-width="2"
      opacity="${p.result === 'Ball' ? 0.6 : 1}"/>`;
  }).join('');
}

// ─────────────────────────────────────────
//  SUMMARY SCREEN
// ─────────────────────────────────────────
function showSummary(s) {
  window._ss = s;

  // Header
  document.getElementById('sum-pitcher').textContent = s.pitcher;
  const d = new Date(s.date).toLocaleDateString('en-US',
    {weekday:'long', month:'long', day:'numeric', year:'numeric'});
  document.getElementById('sum-meta').textContent = `${d} · ${s.pitches.length} pitches`;

  // Zone dots
  setTimeout(() => renderDots('sum-dots-layer', s.pitches), 40);

  // Stats
  const total  = s.pitches.length;
  const inZ    = s.pitches.filter(p => p.zone==='in-zone').length;
  const comp   = s.pitches.filter(p => p.zone==='competitive').length;
  const noComp = s.pitches.filter(p => p.zone==='non-competitive').length;
  const pct    = n => total ? Math.round(n/total*100) : 0;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-val" style="color:#16a34a">${pct(inZ)}%</div>
      <div class="stat-lbl">In-Zone</div>
      <div class="stat-sub">${inZ} pitches</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#2563eb">${pct(inZ+comp)}%</div>
      <div class="stat-lbl">Competitive</div>
      <div class="stat-sub">${inZ+comp} pitches</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#dc2626">${pct(noComp)}%</div>
      <div class="stat-lbl">Non-Comp</div>
      <div class="stat-sub">${noComp} pitches</div>
    </div>`;

  // Legend
  const used = PITCH_TYPES.filter(pt => s.pitches.some(p => p.type === pt.id));
  document.getElementById('legend').innerHTML =
    used.map(pt => `<div class="legend-item">
      <div class="dot" style="background:${pt.color}"></div>
      <span>${pt.id} – ${pt.name}</span>
    </div>`).join('') +
    `<div class="legend-item">
       <div class="dot" style="background:#94a3b8;opacity:.6"></div>
       <span>Faded = Ball</span>
     </div>`;

  // Breakdown table
  const rows = PITCH_TYPES.map(pt => {
    const pp = s.pitches.filter(p => p.type === pt.id);
    if (!pp.length) return '';
    const n  = pp.length;
    const ks = pp.filter(p => p.result==='Strike').length;
    const iz = pp.filter(p => p.zone==='in-zone').length;
    const cp = pp.filter(p => p.zone==='competitive').length;
    return `<tr>
      <td><div class="type-cell">
        <div class="dot" style="background:${pt.color}"></div>
        <strong>${pt.id}</strong>
        <span style="color:var(--muted);font-size:11px;font-weight:500">${pt.name}</span>
      </div></td>
      <td>${n}</td>
      <td>${Math.round(ks/n*100)}%</td>
      <td>${Math.round((n-ks)/n*100)}%</td>
      <td>${Math.round(iz/n*100)}%</td>
      <td>${Math.round((iz+cp)/n*100)}%</td>
    </tr>`;
  }).join('');

  document.getElementById('breakdown-table').innerHTML = `
    <thead><tr>
      <th>Pitch</th><th>#</th><th>Strike%</th><th>Ball%</th><th>Zone%</th><th>Comp%</th>
    </tr></thead>
    <tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">No pitches logged</td></tr>'}</tbody>`;

  showScreen('summary');
}

// ─────────────────────────────────────────
//  CSV EXPORT
// ─────────────────────────────────────────
function exportCSV() {
  const s = window._ss;
  if (!s) return;
  const hdr  = ['#','Type','Pitch Name','Result','Zone','X (0-1)','Y (0-1)','Timestamp'];
  const rows = s.pitches.map((p, i) => {
    const pt = PITCH_TYPES.find(t => t.id === p.type);
    return [i+1, p.type, pt?pt.name:'', p.result, p.zone, p.x.toFixed(3), p.y.toFixed(3),
            new Date(p.ts).toLocaleString()].join(',');
  });
  const csv  = [hdr.join(','), ...rows].join('\n');
  const a    = Object.assign(document.createElement('a'), {
    href:     URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'})),
    download: `${s.pitcher.replace(/\s+/g,'_')}_${s.date.slice(0,10)}.csv`
  });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('CSV exported ✓');
}

// ─────────────────────────────────────────
//  PDF EXPORT
// ─────────────────────────────────────────
function exportPDF() {
  const s = window._ss;
  if (!s) return;

  const total  = s.pitches.length;
  const inZ    = s.pitches.filter(p => p.zone === 'in-zone').length;
  const comp   = s.pitches.filter(p => p.zone === 'competitive').length;
  const noComp = s.pitches.filter(p => p.zone === 'non-competitive').length;
  const pct    = n => total ? Math.round(n / total * 100) : 0;
  const d      = new Date(s.date).toLocaleDateString('en-US',
    { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  // ── Zone heat map: count pitches in each of the 9 cells ──
  // Cells arranged [row][col], row 0 = top, col 0 = arm side
  // Strike zone x: 0.25–0.75, y: 0.15–0.85  → 3 equal cols/rows
  const xEdges = [0.25, 0.4167, 0.5833, 0.75];
  const yEdges = [0.15, 0.3833, 0.6167, 0.85];
  const zoneCounts = Array.from({ length: 3 }, () => [0, 0, 0]);
  s.pitches.forEach(p => {
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        if (p.x >= xEdges[c] && p.x < xEdges[c+1] &&
            p.y >= yEdges[r] && p.y < yEdges[r+1]) {
          zoneCounts[r][c]++;
        }
      }
    }
  });
  const maxCount = Math.max(1, ...zoneCounts.flat());

  function zoneColor(count) {
    if (count === 0) return '#f8fafc';
    const ratio = count / maxCount;
    if (ratio >= 0.6) return '#fca5a5'; // red-300
    if (ratio >= 0.3) return '#fde68a'; // amber-200
    return '#fef9c3';                   // yellow-100 (low)
  }

  function zoneTextColor(count) {
    const ratio = count / maxCount;
    if (ratio >= 0.6) return '#991b1b';
    if (ratio >= 0.3) return '#92400e';
    return '#78350f';
  }

  // Build 9-cell SVG zone (heat map)
  const SVG_W2 = 280, SVG_H2 = 320;
  const cellW  = 46.67, cellH = 74.67;
  const zx0    = 70, zy0 = 48;
  let cellsSVG = '';
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const cx  = zx0 + c * cellW;
      const cy  = zy0 + r * cellH;
      const cnt = zoneCounts[r][c];
      cellsSVG += `
        <rect x="${cx.toFixed(1)}" y="${cy.toFixed(1)}"
              width="${cellW.toFixed(1)}" height="${cellH.toFixed(1)}"
              fill="${zoneColor(cnt)}" rx="0"/>
        <text x="${(cx + cellW/2).toFixed(1)}" y="${(cy + cellH/2 + 6).toFixed(1)}"
              text-anchor="middle" font-size="20" font-weight="900"
              fill="${cnt === 0 ? '#cbd5e1' : zoneTextColor(cnt)}"
              font-family="sans-serif">${cnt}</text>`;
    }
  }

  const heatSVG = `
  <svg viewBox="0 0 ${SVG_W2} ${SVG_H2}" xmlns="http://www.w3.org/2000/svg"
       style="width:240px;height:auto;display:block;margin:0 auto">
    <rect width="${SVG_W2}" height="${SVG_H2}" fill="#f8fafc"/>
    <!-- competitive zone -->
    <rect x="42" y="16" width="196" height="288" rx="4"
          fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,4"/>
    <!-- heat cells -->
    ${cellsSVG}
    <!-- grid lines -->
    <line x1="116.7" y1="48"  x2="116.7" y2="272" stroke="#94a3b8" stroke-width="1"/>
    <line x1="163.3" y1="48"  x2="163.3" y2="272" stroke="#94a3b8" stroke-width="1"/>
    <line x1="70"    y1="122.7" x2="210"  y2="122.7" stroke="#94a3b8" stroke-width="1"/>
    <line x1="70"    y1="197.3" x2="210"  y2="197.3" stroke="#94a3b8" stroke-width="1"/>
    <!-- strike zone border -->
    <rect x="70" y="48" width="140" height="224" fill="none" stroke="#1e293b" stroke-width="2.5"/>
    <!-- direction labels -->
    <text x="140" y="11"  text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif" font-weight="700">HIGH</text>
    <text x="140" y="318" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif" font-weight="700">LOW</text>
    <text x="8"   y="160" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif" font-weight="700" transform="rotate(-90 8 160)">LEFT</text>
    <text x="272" y="160" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif" font-weight="700" transform="rotate(90 272 160)">RIGHT</text>
  </svg>`;

  // ── Pitch breakdown table rows ──
  const tableRows = PITCH_TYPES.map(pt => {
    const pp = s.pitches.filter(p => p.type === pt.id);
    if (!pp.length) return '';
    const n  = pp.length;
    const ks = pp.filter(p => p.result === 'Strike').length;
    const iz = pp.filter(p => p.zone === 'in-zone').length;
    const cp = pp.filter(p => p.zone === 'competitive').length;
    return `<tr>
      <td style="text-align:left;padding:9px 10px">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;
               background:${pt.color};margin-right:6px;vertical-align:middle"></span>
        <strong>${pt.id}</strong>
        <span style="color:#64748b;font-size:11px;margin-left:4px">${pt.name}</span>
      </td>
      <td>${n}</td>
      <td>${Math.round(ks/n*100)}%</td>
      <td>${Math.round((n-ks)/n*100)}%</td>
      <td>${Math.round(iz/n*100)}%</td>
      <td>${Math.round((iz+cp)/n*100)}%</td>
    </tr>`;
  }).join('');

  // ── Legend ──
  const used = PITCH_TYPES.filter(pt => s.pitches.some(p => p.type === pt.id));
  const legendHTML = used.map(pt =>
    `<div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600">
       <div style="width:10px;height:10px;border-radius:50%;background:${pt.color};flex-shrink:0"></div>
       <span>${pt.id} – ${pt.name}</span>
     </div>`
  ).join('');

  // ── Heat map legend ──
  const heatLegend = `
    <div style="display:flex;align-items:center;gap:14px;font-size:11px;font-weight:600;color:#64748b;margin-top:8px;justify-content:center">
      <span style="display:flex;align-items:center;gap:5px">
        <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#fca5a5;border:1px solid #f87171"></span> High
      </span>
      <span style="display:flex;align-items:center;gap:5px">
        <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#fde68a;border:1px solid #fcd34d"></span> Medium
      </span>
      <span style="display:flex;align-items:center;gap:5px">
        <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#f8fafc;border:1px solid #e2e8f0"></span> Low / None
      </span>
    </div>`;

  // ── Full printable HTML ──
  const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitchTag — ${esc(s.pitcher)} — ${s.date.slice(0,10)}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #0f172a;
      padding: 32px 28px;
      max-width: 680px;
      margin: 0 auto;
    }
    /* Header */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: white;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 22px; font-weight: 900; }
    .header p  { font-size: 13px; opacity: .8; margin-top: 3px; }
    .header .badge {
      background: rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 6px 16px;
      text-align: center;
    }
    .header .badge .num { font-size: 26px; font-weight: 900; line-height: 1; }
    .header .badge .lbl { font-size: 10px; opacity: .8; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    /* Section title */
    .sec-title {
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 10px;
    }
    /* Stat cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 22px;
    }
    .stat-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-val { font-size: 28px; font-weight: 900; line-height: 1; }
    .stat-lbl { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .4px; margin-top: 4px; }
    .stat-sub { font-size: 11px; color: #94a3b8; margin-top: 3px; }
    /* Zone section */
    .zone-section {
      margin-bottom: 22px;
      text-align: center;
    }
    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 22px;
    }
    /* Table */
    .tbl-wrap {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead tr { background: #f1f5f9; }
    th {
      padding: 10px 10px;
      font-size: 10px;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .4px;
      text-align: center;
    }
    th:first-child { text-align: left; }
    td {
      padding: 9px 10px;
      text-align: center;
      border-bottom: 1px solid #f1f5f9;
      font-weight: 600;
    }
    td:first-child { text-align: left; }
    tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      padding-top: 8px;
      border-top: 1px solid #e2e8f0;
    }
    @media print {
      body { padding: 16px; }
      .no-print { display: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
      <h1>⚾ ${esc(s.pitcher)}</h1>
      <p>${d}</p>
    </div>
    <div class="badge">
      <div class="num">${total}</div>
      <div class="lbl">Pitches</div>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="sec-title">Session Overview</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" style="color:#16a34a">${pct(inZ)}%</div>
      <div class="stat-lbl">In-Zone</div>
      <div class="stat-sub">${inZ} pitches</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#2563eb">${pct(inZ+comp)}%</div>
      <div class="stat-lbl">Competitive</div>
      <div class="stat-sub">${inZ+comp} pitches</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#dc2626">${pct(noComp)}%</div>
      <div class="stat-lbl">Non-Comp</div>
      <div class="stat-sub">${noComp} pitches</div>
    </div>
  </div>

  <!-- Heat map zone -->
  <div class="zone-section">
    <div class="sec-title">Pitch Location Heat Map</div>
    ${heatSVG}
    ${heatLegend}
  </div>

  <!-- Pitch type legend -->
  <div class="sec-title">Pitch Types Used</div>
  <div class="legend">${legendHTML}</div>

  <!-- Breakdown table -->
  <div class="sec-title">Pitch Breakdown</div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Pitch</th><th>#</th><th>Strike%</th><th>Ball%</th><th>Zone%</th><th>Comp%</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows || '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:20px">No pitches logged</td></tr>'}
      </tbody>
    </table>
  </div>

  <!-- Save instructions (hidden on print) -->
  <div class="no-print" style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;
       padding:14px 16px;margin-bottom:20px;font-size:13px;color:#1e40af;line-height:1.5">
    <strong>📲 Save as PDF:</strong> Use your browser's <strong>Print</strong> function
    (Ctrl+P / Cmd+P) and choose <em>"Save as PDF"</em> — or on iPhone/iPad, tap the
    Share icon and select <em>"Print"</em> → pinch-zoom to save as PDF.
  </div>

  <div class="footer">Generated by PitchTag · ${new Date().toLocaleDateString()}</div>

</body>
</html>`;

  const win = window.open('', '_blank');
  if (!win) { toast('Allow popups to export PDF'); return; }
  win.document.write(html);
  win.document.close();
  toast('PDF ready — use Print → Save as PDF');
}


let _tt;
function toast(msg, dur=1800) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), dur);
}

// ─────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const esc   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ─────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Home
  document.getElementById('start-btn').addEventListener('click', startSession);
  document.getElementById('pitcher-name').addEventListener('keydown', e => { if (e.key==='Enter') startSession(); });

  // Zone taps (touch + mouse)
  const zw = document.getElementById('zone-wrap');
  zw.addEventListener('touchstart', handleZoneTap, { passive: false });
  zw.addEventListener('touchmove',  handleZoneTap, { passive: false });
  zw.addEventListener('mousedown',  handleZoneTap);

  // Logger buttons
  document.getElementById('res-strike').addEventListener('click', () => pickResult('Strike'));
  document.getElementById('res-ball').addEventListener('click',   () => pickResult('Ball'));
  document.getElementById('log-btn').addEventListener('click',    logPitch);
  document.getElementById('undo-btn').addEventListener('click',   undoPitch);
  document.getElementById('end-btn').addEventListener('click',    endSession);

  // Summary
  document.getElementById('new-session-btn').addEventListener('click', () => {
    session = null; initHome(); showScreen('home');
  });
  document.getElementById('export-btn').addEventListener('click', exportCSV);
  document.getElementById('export-pdf-btn').addEventListener('click', exportPDF);

  initHome();

  // Restore mobile view preference
  if (localStorage.getItem('pitchtag_mobileview') === '1') {
    document.body.classList.add('mobile-view');
    const btn = document.getElementById('mobile-view-btn');
    btn.classList.add('active');
    btn.textContent = '🖥️ Full View';
  }
});
</script>
</body>
